services:
  postgres:
    image: postgres:16-alpine
    container_name: se-challenge-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: se-challenge-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/users_db
      JWT_SECRET: dev-only-secret-replace-in-prod
      CORS_ORIGINS: http://localhost:3000
      PORT: 8080
    ports:
      - "8080:8080"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations

volumes:
  pg_data:
