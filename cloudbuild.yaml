# Cloud Build pipeline: lint -> test -> build -> push -> migrate -> deploy
#
# Required substitutions (configure in trigger or pass via --substitutions):
#   _REGION         GCP region (e.g. us-central1)
#   _AR_REPO        Artifact Registry repo name (e.g. containers)
#   _SERVICE        Cloud Run service name
#   _SA             Runtime service account email
#
# Required Secret Manager entries:
#   database-url               Full asyncpg DSN (Neon: postgresql+asyncpg://...?ssl=require)
#   jwt-secret                 Long random string for JWT signing
#   bootstrap-admin-password   Initial admin password

substitutions:
  _REGION: us-central1
  _AR_REPO: containers
  _SERVICE: se-challenge-api
  _SQL_INSTANCE: ${PROJECT_ID}:us-central1:se-challenge-pg
  _SA: run-sa@${PROJECT_ID}.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1) Lint + test
  - id: test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq --no-install-recommends build-essential
        pip install --no-cache-dir -e ".[dev]"
        ruff check src tests
        SKIP_INTEGRATION=1 pytest tests/unit --cov=src/app --cov-report=term-missing

  # 2) Build image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"
      - "."

  # 3) Push image
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}"

  # 4) Run Alembic migrations as a one-shot Cloud Run Job
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_URI="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
        if gcloud run jobs describe ${_SERVICE}-migrate --region=${_REGION} >/dev/null 2>&1; then
          gcloud run jobs update ${_SERVICE}-migrate \
            --image="$$IMAGE_URI" \
            --region=${_REGION} \
            --command="alembic" --args="upgrade,head" \
            --set-cloudsql-instances=${_SQL_INSTANCE} \
            --set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest \
            --service-account=${_SA}
        else
          gcloud run jobs create ${_SERVICE}-migrate \
            --image="$$IMAGE_URI" \
            --region=${_REGION} \
            --command="alembic" --args="upgrade,head" \
            --set-cloudsql-instances=${_SQL_INSTANCE} \
            --set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest \
            --service-account=${_SA}
        fi
        gcloud run jobs execute ${_SERVICE}-migrate --region=${_REGION} --wait

  # 5) Deploy Cloud Run service
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-secrets=DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,BOOTSTRAP_ADMIN_PASSWORD=bootstrap-admin-password:latest
      - --set-env-vars=ENV=production,LOG_LEVEL=INFO,ALLOW_SELF_REGISTER=false,BOOTSTRAP_ADMIN_USERNAME=admin,BOOTSTRAP_ADMIN_EMAIL=admin@example.com
      - --service-account=${_SA}
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=30
      - --port=8080

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:latest"

timeout: 1800s
